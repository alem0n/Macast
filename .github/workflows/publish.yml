name: 'publish'

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: import windows certificate
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          try {
            if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE_PASSWORD)) {
              Write-Host "SKIP: Windows certificate not configured"
              exit 0
            }
            New-Item -ItemType Directory -Path certificate -Force | Out-Null
            Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
            certutil -decode certificate/tempCert.txt certificate/certificate.pfx
            Remove-Item -path certificate -include tempCert.txt
            Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          } catch {
            Write-Host "WARN: Certificate import failed: $_"
            exit 0
          }

      - name: install system dependencies (mpv)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $mpvDir = "bin"
          New-Item -ItemType Directory -Force -Path $mpvDir | Out-Null

          # Get latest release info from shinchiro/mpv-winbuild-cmake
          Write-Host "Fetching latest mpv release info..."
          $apiUrl = "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $release = Invoke-RestMethod -Uri $apiUrl -Headers @{ Authorization = "Bearer $env:GH_TOKEN" }
          $tag = $release.tag_name
          Write-Host "Latest tag: $tag"

          # Find the x86_64 mpv asset (not dev, not ffmpeg)
          $asset = $release.assets | Where-Object { $_.name -like 'mpv-x86_64-*.7z' -and $_.name -notlike 'mpv-dev-*' } | Select-Object -First 1
          if (-not $asset) {
            # Fallback: try dev variant
            $asset = $release.assets | Where-Object { $_.name -like 'mpv-dev-x86_64-*.7z' } | Select-Object -First 1
          }
          if (-not $asset) {
            Write-Host "ERROR: No mpv x86_64 asset found in latest release"
            exit 1
          }

          $mpvUrl = $asset.browser_download_url
          $mpvFile = $asset.name
          Write-Host "Downloading $mpvFile ..."
          Invoke-WebRequest -Uri $mpvUrl -OutFile "$mpvDir\$mpvFile" -UseBasicParsing

          # Extract
          Write-Host "Extracting $mpvFile ..."
          if (Get-Command 7z -ErrorAction SilentlyContinue) {
            7z x "$mpvDir\$mpvFile" -o"$mpvDir\tmp" -y | Out-Null
          } else {
            Write-Host "7z not found, trying tar..."
            tar -xf "$mpvDir\$mpvFile" -C "$mpvDir\tmp" --force-local 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: Cannot extract $mpvFile"
              exit 1
            }
          }
          $mpvExe = Get-ChildItem -Recurse -Filter "mpv.exe" "$mpvDir\tmp" | Select-Object -First 1
          if ($mpvExe) {
            Copy-Item $mpvExe.FullName "$mpvDir\mpv.exe" -Force
            Write-Host "mpv.exe extracted to $mpvDir\mpv.exe"
          } else {
            Write-Host "ERROR: mpv.exe not found in extracted archive"
            exit 1
          }
          Remove-Item -Recurse -Force "$mpvDir\$mpvFile", "$mpvDir\tmp" -ErrorAction SilentlyContinue

      - name: build Web Renderer 2 (React client + staging)
        shell: pwsh
        run: |
          # Build React client
          Push-Location web_renderer_2\client
          npm install --quiet
          npm run build
          Pop-Location

          # Create staging directory
          $staging = "web_renderer_2\staging"
          if (Test-Path $staging) { Remove-Item -Recurse -Force $staging }
          New-Item -ItemType Directory -Force -Path "$staging\server_py" | Out-Null
          New-Item -ItemType Directory -Force -Path "$staging\client\dist" | Out-Null

          Copy-Item -Recurse "web_renderer_2\server_py\*" "$staging\server_py\"
          Copy-Item -Recurse "web_renderer_2\client\dist\*" "$staging\client\dist\"
          Copy-Item "web_renderer_2\macast_renderer.py" "$staging\plugin.py"

          Write-Host "Web Renderer 2 staging ready at $staging" -ForegroundColor Green

      - name: install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip --quiet
          pip install requests appdirs cherrypy lxml ifaddr pillow pyperclip pystray pywin32 --quiet
          pip install pyinstaller polib aiohttp --quiet
          pip install -e $env:GITHUB_WORKSPACE --quiet

      - name: compile translations (.po -> .mo)
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE -replace '\\', '/'
          python -c @"
          import polib, pathlib
          root = pathlib.Path(r'$root')
          for lang in ['zh_CN', 'fi', 'it']:
              po = polib.pofile(str(root / 'i18n' / lang / 'LC_MESSAGES' / 'macast.po'))
              po.save_as_mofile(str(root / 'i18n' / lang / 'LC_MESSAGES' / 'macast.mo'))
              print(f'  compiled: {lang}')
          "@

      - name: build Macast.exe (PyInstaller)
        shell: pwsh
        run: |
          $stagingDir = "web_renderer_2\staging"
          $pyiArgs = @(
            "--noconfirm", "-F", "-w",
            "--additional-hooks-dir=.",
            "--add-data=macast/.version;.",
            "--add-data=macast/xml;macast/xml",
            "--add-data=i18n;i18n",
            "--add-data=macast/assets;macast/assets",
            "--add-binary=bin/mpv.exe;bin",
            "--add-data=$stagingDir;web_renderer_2_app",
            "--hidden-import=aiohttp",
            "--icon=macast/assets/icon.ico",
            "Macast.py"
          )
          python -m PyInstaller $pyiArgs

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macast-Windows
          path: dist/Macast.exe

      - name: create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          name: Macast ${{ github.ref_name }}
          body: |
            ## Macast ${{ github.ref_name }}

            See the assets below to download this version and install.

            ### Windows
            - `Macast.exe` — standalone executable (mpv bundled)
          files: dist/Macast.exe
          draft: false
          prerelease: false
