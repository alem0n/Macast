name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install requests appdirs cherrypy lxml ifaddr pillow --quiet
          pip install -e . --quiet

      - name: Python syntax check
        run: |
          python -c "
          import ast, sys, glob, os
          for f in glob.glob('**/*.py', recursive=True):
              if f.startswith('.venv') or 'vendor' in f:
                  continue
              try:
                  ast.parse(open(f, encoding='utf-8').read())
              except SyntaxError as e:
                  print('SYNTAX ERROR in ' + f + ': ' + str(e))
                  sys.exit(1)
          print('All files parse OK')
          "
